<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - BankDigital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .brand-logo { font-size: 2rem; font-weight: 800; color: #1a3c5e; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card login-card p-4">
        <div class="text-center mb-4">
          <div class="brand-logo">🏦 BankDigital</div>
          <p class="text-muted mt-1">Espace Professionnel</p>
        </div>
        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control form-control-lg" placeholder="votre@email.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Mot de passe</label>
            <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100">Se connecter</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
